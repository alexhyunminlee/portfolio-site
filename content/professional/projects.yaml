# Professional projects displayed on the Projects page.
projects:
  - title: "Predictive Maintenance Pipeline"
    dates: "Jan 2024 – Present"
    status: "In Progress"
    description: >
      End-to-end ML pipeline that ingests vibration sensor streams, engineers features
      (RMS, kurtosis, FFT bands), trains an LSTM model, and serves predictions via a
      REST API — all containerised with Docker Compose.
    highlights:
      - "Reduced unplanned downtime by 18% across 3 production lines."
      - "Processes 5M+ sensor records per day via Airflow ETL pipelines."
      - "Model achieves 94% precision on bearing-failure detection 48 hours in advance."
      - "REST API serves predictions with <50ms p99 latency."
    tags: ["Python", "PyTorch", "FastAPI", "Docker"]
    link: "https://github.com/alexhyunminlee/pred-maintenance"

  - title: "CFD Post-Processor"
    dates: "Aug 2023 – Dec 2023"
    status: "Completed"
    description: >
      A Python toolkit for batch-processing OpenFOAM output files: extracts pressure /
      velocity fields, generates publication-quality plots, and exports summary CSVs.
      Reduced analysis time from hours to minutes.
    highlights:
      - "Automated post-processing for 200+ simulation cases."
      - "Reduced per-case analysis time from ~4 hours to under 10 minutes."
      - "Generates publication-quality pressure and velocity field plots via Matplotlib."
      - "Exports structured CSVs consumed directly by downstream regression models."
    tags: ["Python", "NumPy", "Matplotlib", "OpenFOAM"]
    link: "https://github.com/alexhyunminlee/cfd-postprocess"

  - title: "Sensor Dashboard"
    dates: "Mar 2023 – Jul 2023"
    status: "Completed"
    description: >
      FastAPI + HTMX real-time dashboard that polls an InfluxDB time-series database
      and renders live charts without a heavy JS framework. Deployed on a Raspberry Pi
