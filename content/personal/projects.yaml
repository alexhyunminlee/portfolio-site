# Personal projects displayed on the Projects page.
# `slug` must be unique across ALL projects (professional + personal).
# It is used as the URL anchor: /projects#project-{slug}
personal_projects:
  - title: "Portfolio Site"
    slug: "portfolio-site"
    dates: "Jun 2026 – Present"
    status: "In Progress"
    description: >
      This site — a FastAPI-powered portfolio with Jinja2 templates, Tailwind CSS,
      Alpine.js micro-interactions, and HTMX for progressive enhancement. Content
      driven by structured YAML files.
    highlights:
      - "Content fully driven by YAML files — no code changes needed to update copy."
      - "Server-side rendered with FastAPI and Jinja2; no frontend build step."
      - "Uses Alpine.js for modals, toggles, and micro-interactions."
      - "Deployable to Render or any Docker host via included config files."
    tags: ["FastAPI", "Tailwind", "Alpine.js", "HTMX"]
    link: "https://github.com/alexhyunminlee/portfolio-site"